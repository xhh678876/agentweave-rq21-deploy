# =============================================================================
# Agent Skills Benchmark Configuration (Claude Code CLI Mode)
# =============================================================================

# -----------------------------------------------------------------------------
# Global settings
# -----------------------------------------------------------------------------
global:
  workspace_dir: "/workspace"
  golden_reference_dir: "/tmp/golden_reference"
  reports_dir: "./reports"
  log_level: "INFO"
  # Task file base directory; combined with active_batch at runtime → tasks/{active_batch}
  tasks_dir: "tasks"
  # Test file base directory; combined with active_batch at runtime → tests/{active_batch}
  tests_dir: "tests"
  # All available evaluation batches
  batches: [batch1]
  # Active batch for single-skill runs (run_all_skills.py overrides this per batch)
  active_batch: "batch1"
  # Network mode: "none" for full isolation, "bridge" to allow network access
  # Note: environment setup may require bridge to install git and clone repositories
  # Later stages (build/test) can use none for isolation
  network_mode: "bridge"

# -----------------------------------------------------------------------------
# Skill definitions
# -----------------------------------------------------------------------------
skills:
  # =========================================================================
  # Skill: add-uint-support
  # =========================================================================
  - id: "add-uint-support"
    name: "Add UInt Support"
    description: "Restore uint32/uint64 operator support in PyTorch"
    type: "repair"

    # Repository settings
    repo:
      url: null  # "https://github.com/pytorch/pytorch.git"  # Repo already present in the image; no need to clone
      commit: # "3d7b5bf813d0a7a92179b1bb395ca4b069fa148d"  
      # Sparse checkout (optional)
      sparse_checkout: []

    # Docker environment settings - user-provided image
    environment:
      # Base image
      base_image: "zhangyiiiiii/swe-skills-bench-pytorch:latest"

      # Or build via Dockerfile (choose one: this or base_image)
      dockerfile: ""
      build_context: ""
      build_args: {}

      # Resource limits
      limits:
        cpus: "4"
        memory: "16g"
        timeout_per_command: 300

      # Environment variables
      env_vars: {}

      # Initialization commands after container starts
      setup_commands: []

      # Pre-process (optional, set to null if not needed)
      pre_process: null

      # Interaction limits
      limits:
        max_iterations: 1
        total_timeout_sec: 1800

      # Task instruction (Claude Code CLI mode)
      # tasks/add-uint-support.md stores the task description (required)

      evaluation:
        # L1: Build check
        - level: "L1"
          method: "build_check"
          enabled: true
          params:
            build_command: "cd pytorch && MAX_JOBS=4 USE_CUDA=0 python setup.py develop"
            expected_exit_code: 0
            timeout: 3600

        # L2: Unit tests
        - level: "L2"
          method: "unit_test"
          enabled: true
          params:
            test_command: "python -m pytest /workspace/tests/test_add_uint_support.py -v --tb=short"
            min_pass_rate: 0.5 # Baseline expectation: 3 of 6 tests pass, 3 fail
            timeout: 600

